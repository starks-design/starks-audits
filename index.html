<script>
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('a[href*="tidycal"],a[href*="mailto"],a[href*="tel:"]').forEach(function(el){
    el.addEventListener('click',function(){clarity('event','cta_click');});
  });
  var locks=document.querySelectorAll('.lock-badge,[data-lock],.blur-card');
  locks.forEach(function(el){
    el.addEventListener('click',function(){clarity('event','lock_click');});
  });
  var observer=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){clarity('event','reached_'+e.target.dataset.section);observer.unobserve(e.target);}
    });
  },{threshold:0.5});
  document.querySelectorAll('[data-section]').forEach(function(el){observer.observe(el);});
  var scrollMax=0;
  window.addEventListener('scroll',function(){
    var pct=Math.round((window.scrollY+window.innerHeight)/document.documentElement.scrollHeight*100);
    if(pct>scrollMax){scrollMax=pct;if(pct>=25&&scrollMax<30)clarity('event','scroll_25');if(pct>=50&&scrollMax<55)clarity('event','scroll_50');if(pct>=75&&scrollMax<80)clarity('event','scroll_75');if(pct>=90&&scrollMax<95)clarity('event','scroll_90');}
  });
});
</script>
